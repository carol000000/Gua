<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>青呱Gua的網頁-連結</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
/* 定義全域變數方便修改 */
:root {
    --sidebar-width: 250px;
    --sidebar-collapsed-width: 70px;
    --glass-white: rgba(255, 255, 255, 0.1);
    --glass-border: rgba(255, 255, 255, 0.2);
}

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    background: #2b61e7; /* 深藍底色 */
    /* 這裡可以換成你喜歡的背景圖 */
    background-image: linear-gradient(135deg, #ffffff 0%, #ffffffe3 100%);
    background-attachment: fixed;
    color: rgb(31, 150, 255);/*文字顏色*/
    font-family: sans-serif;
    display: flex;
    min-height: 100vh;
}

/* 隱藏 Checkbox 本身 */
.menu-checkbox {
    display: none;
}

/* --- 側邊欄樣式 --- */
.sidebar {
    width: var(--sidebar-width);
    background: rgba(0, 70, 247, 0.863);
    backdrop-filter: blur(12px);
    border-right: 1px solid var(--glass-border);
    position: fixed;
    height: 100vh;
    transition: width 0.3s ease;
    z-index: 100;
    overflow: hidden;
    
}

/* 當 Checkbox 被勾選時，縮小側邊欄 */
.menu-checkbox:checked ~ .sidebar {
    width: var(--sidebar-collapsed-width);
}

/* 開關按鈕：確保水平與垂直都居中 */
.toggle-btn {
    color: #ffffff; /* 這裡設定你想要的開關顏色，例如金色 */
    font-size: 1.5rem;
    display: flex;
    justify-content: center; /* 水平居中核心 */
    align-items: center;     /* 垂直居中核心 */
    height: 70px;            /* 固定高度 */
    width: 100%;             /* 寬度撐滿側邊欄 */
    cursor: pointer;
    font-size: 1.4rem;
}

.sidebar ul {
    list-style: none;
    margin-top: 10px;
}

.sidebar a {
    display: flex;
    align-items: center;
    color: rgb(255, 255, 255); /*側邊圖片顏色*/
    text-decoration: none;
    height: 60px;
    white-space: nowrap;
    transition: background 0.2s;
}

.sidebar a:hover {
    background: rgba(255, 232, 25, 0.918); /*側邊選擇顏色*/
}

/* 讓選單圖示始終保持在側邊欄中央 */
.sidebar i {
    min-width: var(--sidebar-collapsed-width); /* 圖示佔位寬度等於收合寬度 */
    text-align: center;
    font-size: 1.2rem;
}

/* 收合時隱藏文字 */
.menu-checkbox:checked ~ .sidebar span {
    display: none;
}

/* --- 右側內容與置中邏輯 --- */
.content {
    flex: 1;
    margin-left: var(--sidebar-width);
    transition: margin-left 0.3s ease;
    display: flex;
    justify-content: center; /* 卡片水平居中 */
    align-items: flex-start; /* 卡片靠上對齊，可改為 center */
    padding: 20px 20px;      /* 上方留白 80px */
    
}

/* 選單收合時，內容區跟著調整左邊距 */
.menu-checkbox:checked ~ .content {
    margin-left: var(--sidebar-collapsed-width);
}

/* 中央透明卡片 */
.main-card {
    width: 95%;          /* 在小螢幕時佔據 95% 的寬度 */
    max-width: 1200px;   /* 將最大寬度從 800px 調大至 1200px */
    
    background: var(--glass-white);
    backdrop-filter: blur(20px);
    border: 1px solid var(--glass-border);
    border-radius: 20px;
    box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);/*陰影*/
    
    /* 確保在大寬度下依然置中 */
    margin: 0 auto; 
    overflow: hidden;
}

/* 為了配合變寬的頁面，橫幅高度也可以稍微縮減或調整 */
.banner {
    padding: 40px 60px; /* 減少上下內距，增加左右內距 */
    text-align:center;   /* 如果寬度很大，標題靠左通常比置中好看 */
    /* 漸層色  */
     background: linear-gradient(135deg, #3498db, #2c3e50); 
}
.page-body {
    padding: 40px;
    line-height: 1.8;
}
/* 放大橫幅（Banner）的大標題 */
.banner h1 {
    font-size: 3.5rem;   /* 原本可能是 2.5rem，調大至 3.5rem */
    font-weight: bold;   /* 加粗讓它更有份量 */
}

/* 放大頁面內文 */
.page-body p {
    font-size: 1.25rem;  /* 稍微放大，適合閱讀 */
    line-height: 1.8;    /* 增加行高，文字才不會擠在一起 */
}

.page-body h2{
    font-size: 2rem;
}

/* 放大側邊選單的文字 */
.sidebar span {
    font-size: 1.1rem;   /* 讓選單文字更清晰 */
    letter-spacing: 1px; /* 增加字距，質感更好 */
}


    </style>
</head>
<body>

    <input type="checkbox" id="menu-toggle" class="menu-checkbox">

    <nav class="sidebar">
        <label for="menu-toggle" class="toggle-btn">
            <i class="fas fa-bars"></i>
        </label>
        <ul>
            <li><a href="/index.html"><i class="fas fa-home"></i> <span>首頁</span></a></li>
            <li><a href="/html/item.html"><i class="fas fa-file-alt"></i> <span>我的東西</span></a></li>
            <li><a href="/html/game.html"><i class="fas fa-gamepad"></i> <span>小遊戲</span></a></li>
            <li><a href="/html/parpar.html"><i class="fas fa-pen"></i> <span>文章</span></a></li>
            <li><a href="/html/link.html"><i class="fas fa-paperclip"></i> <span>連結</span></a></li>
        </ul>
    </nav>

    <div class="content">
        <article class="main-card">
            <header class="banner">
                <h1>連結</h1>
            </header>
            <div class="page-body">
                <p>未完成</p>
            </div>
        </article>
    </div>

</body>
</html>
